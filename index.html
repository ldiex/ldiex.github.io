<h3 id="section">27</h3>
<p>记得你说跑步腿脚酸痛</p>
<p>一开始大家都是这样的啊，酸痛是个好征兆，说明你的锻炼是有效的</p>
<p>有一句用烂的老话叫<strong>贵在坚持</strong></p>
<p>不知道你是否是讨厌流汗，但在我觉得，和酸痛、无力斗争以及流汗的那种爽快，也就只有跑步能带给我</p>
<p>虽然对女孩子来说，跑完步应马上洗澡，晨跑的一般把洗澡时间放在早上；也许大部分人都是晚上洗澡，但夜跑对于女孩子来说有些危险，即使这点我是完全不担心你的 ：）</p>
